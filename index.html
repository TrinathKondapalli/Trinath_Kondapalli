<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trinadh Kondapalli | Creative Designer & Developer</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    
    <style>
      /* Ensure the body wraps the root in the requested 12px margin, giving the "floating card against browser edge" effect */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #000; /* Pure black behind the floating container */
        min-height: 100vh;
      }
      body {
        padding: 12px; /* Outer margin on all sides */
        box-sizing: border-box;
      }
      #root {
        background-color: #081509; /* Deep forest green black base */
        min-height: calc(100vh - 24px);
        border-radius: 24px; /* Rounded outer container */
        position: relative;
        overflow: hidden;
        /* subtle radial vignette overlay on the entire container */
        background-image: radial-gradient(circle at 50% 30%, rgba(109,215,76,0.06), transparent 60%);
        box-shadow: inset 0 0 0 1px rgba(225,230,220,0.05); /* very subtle border */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
