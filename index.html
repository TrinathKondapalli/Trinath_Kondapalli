    <style>
      /* Ensure the body wraps the root in the requested 12px margin, giving the "floating card against browser edge" effect */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #000; /* Pure black behind the floating container */
        min-height: 100vh;
      }
      body {
        padding: 12px; /* Outer margin on all sides */
        box-sizing: border-box;
      }
      #root {
        background-color: #081509; /* Deep forest green black base */
        min-height: calc(100vh - 24px);
        border-radius: 24px; /* Rounded outer container */
        position: relative;
        overflow: hidden;
        /* subtle radial vignette overlay on the entire container */
        background-image: radial-gradient(circle at 50% 30%, rgba(109,215,76,0.06), transparent 60%);
        box-shadow: inset 0 0 0 1px rgba(225,230,220,0.05); /* very subtle border */
      }
      
      /* Subtle noise/grain texture overlay for premium tactile feel */
      #root::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.04;
      }
    </style>
